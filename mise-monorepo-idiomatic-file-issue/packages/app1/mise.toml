[settings]
experimental = true
lockfile = true
idiomatic_version_file = true
idiomatic_version_file_enable_tools = ["node"]
node.corepack = true

[tools]
# node is installed from the `.node-version` file, but doesn't install pnpm in the postinstall hook 
# node = "25"

[hooks]
# Enabling corepack will install the `pnpm` package manager specified in your package.json
# alternatively, you can also install `pnpm` with mise
postinstall = 'npx corepack enable'

[prepare.pnpm]
auto = true

[env]
_.path = ['{{config_root}}/node_modules/.bin']
PROJECT_NAME = "{{ config_root | basename }}"
BIN_PATH = "{{ config_root }}/node_modules/.bin"
NODE_ENV = "{{ env.NODE_ENV | default(value='development') }}"

[tasks.format]
description = 'Run formatters'
run = ['pnpm format']
